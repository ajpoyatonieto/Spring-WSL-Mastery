<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java 21 PoC - Task Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>Acceso Seguro</h2>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <p id="loginError" style="color: #ef4444; margin-top: 10px; display: none;">Credenciales incorrectas</p>
        </div>
    </div>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-main">
                <h1>Task Manager <span class="badge">Java 21</span></h1>
                <button class="btn-logout" onclick="logout()" title="Cerrar Sesión">Salir 🚪</button>
            </div>
            <p>Conectado a PostgreSQL en WSL</p>
        </header>

        <section class="add-task">
            <div class="form-container">
                <input type="text" id="taskTitle" placeholder="Título de la tarea (Ej: Compras)">
                <textarea id="taskDesc" placeholder="¿Qué hay que hacer exactamente? (Descripción amplia)" rows="3"></textarea>
                <div class="options-group">
                    <input type="text" id="deadlineInput" placeholder="Fecha límite" readonly>
                    <label class="toggle-pill">
                        <input type="checkbox" id="urgentInput">
                        <span>Urgente</span>
                    </label>
                    <label class="toggle-pill">
                        <input type="checkbox" id="importantInput">
                        <span>Importante</span>
                    </label>
                </div>
                <div class="form-actions">
                    <button id="addBtn">Añadir Tarea</button>
                    <button id="cancelBtn" class="btn-cancel" style="display: none;">Cancelar</button>
                </div>
            </div>
        </section>

        <section class="sort-controls">
            <div class="sort-buttons">
                <button onclick="toggleSort('urgent')" class="btn-sort">Urgent</button>
                <button onclick="toggleSort('important')" class="btn-sort">Important</button>
                <button onclick="toggleSort('deadline')" class="btn-sort">Deadline</button>
                <button onclick="clearSort()" class="btn-clear">Reset Sort</button>
            </div>
            <div id="sortIndicators" class="sort-indicators">
                <!-- Los criterios de ordenación aparecerán aquí -->
            </div>
        </section>

        <section class="task-list-container">
            <div id="taskList" class="task-list">
                <!-- Las tareas se cargarán aquí -->
                <div class="loader">Cargando tareas...</div>
            </div>
        </section>

        <footer>
            <div class="footer-content">
                <p><strong>Spring-WSL-Mastery</strong></p>
                <p>Versión <span id="appVersion">2.0.0</span></p>
                <p>&copy; 2026 | Antonio J. Poyato | Antigravity Design</p>
            </div>
        </footer>
    </div>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="assets/js/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
